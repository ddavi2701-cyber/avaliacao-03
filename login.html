<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="image/icone.png">
    <title>MangaKai | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
	<header class="main-header">
        <div class="logo">
            Manga<span>Kai</span>
            <img src="image/kanji.png" valign="middle" alt="Ícone Japonês" class="logo-icon">
        </div>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="produto.html">Mangás</a>
            <a href="new.html">New</a>
            <a href="login.html" class="active">Login</a>
        </nav>
    </header>

	<main class="form-container">
        <form action="#" method="POST" class="custom-form">
            <h2>Área do Leitor</h2>
            
            <div class="form-group">
                <label for="username">Usuário Ninja</label>
                <input type="text" autofocus id="username" required placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label for="password">Senha Secreta</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
			
			<button type="submit" class="btn-submit">Acessar Conta</button>
        </form>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 MangaKai. Desenvolvido para fãs de quadrinhos japoneses.</p>
    </footer>
</body>
</html>
